<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>XR Scene</title>
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <style>
    :root {
      color-scheme: dark;
      --bg: #000;
      --panel: rgba(0,0,0,.58);
      --border: rgba(255,255,255,.16);
      --text: #fff;
      --muted: rgba(255,255,255,.74);
      --accent: #ffffff;
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { margin: 0; width: 100%; height: 100%; overflow: hidden; background: #000; font-family: Arial, Helvetica, sans-serif; }
    #camerafeed { position: fixed; inset: 0; width: 100%; height: 100%; display: block; background: #000; }
    #ui, #startOverlay, #messageOverlay { position: fixed; inset: 0; pointer-events: none; }
    #topBar, #bottomBar, #instruction, #centerGuide, #messageBox, #startCard { pointer-events: auto; }
    #topBar {
      position: fixed; top: max(12px, env(safe-area-inset-top)); left: 12px; right: 12px;
      display: flex; justify-content: space-between; align-items: center; gap: 12px;
    }
    #brand, #statusPill {
      background: var(--panel); border: 1px solid var(--border); color: var(--text); border-radius: 999px;
      padding: 10px 14px; font-size: 13px; backdrop-filter: blur(10px);
    }
    #bottomBar {
      position: fixed; left: 12px; right: 12px; bottom: max(12px, env(safe-area-inset-bottom));
      display: grid; grid-template-columns: repeat(4, minmax(0,1fr)); gap: 10px;
    }
    button, a.actionBtn {
      appearance: none; border: 1px solid var(--border); background: var(--panel); color: var(--text);
      border-radius: 16px; min-height: 54px; padding: 12px 10px; font-size: 14px; font-weight: 700;
      text-decoration: none; display: inline-flex; align-items: center; justify-content: center;
      backdrop-filter: blur(10px); cursor: pointer;
    }
    button:disabled { opacity: .45; cursor: default; }
    #instruction {
      position: fixed; left: 50%; transform: translateX(-50%);
      bottom: calc(max(12px, env(safe-area-inset-bottom)) + 76px);
      width: min(92vw, 420px); text-align: center; color: var(--text);
      background: var(--panel); border: 1px solid var(--border); border-radius: 18px;
      padding: 12px 14px; font-size: 14px; line-height: 1.35; backdrop-filter: blur(10px);
    }
    #centerGuide {
      position: fixed; left: 50%; top: 50%; width: 28px; height: 28px; margin-left: -14px; margin-top: -14px;
      border: 2px solid rgba(255,255,255,.95); border-radius: 50%; opacity: .95; box-shadow: 0 0 0 9999px rgba(0,0,0,0);
    }
    #centerGuide::before, #centerGuide::after {
      content: ''; position: absolute; background: rgba(255,255,255,.95);
    }
    #centerGuide::before { left: 50%; top: -12px; width: 2px; height: 8px; transform: translateX(-50%); }
    #centerGuide::after { top: 50%; left: -12px; width: 8px; height: 2px; transform: translateY(-50%); }
    #startOverlay, #messageOverlay { display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,.55); }
    #startCard, #messageBox {
      width: min(92vw, 420px); background: rgba(8,8,8,.9); border: 1px solid var(--border); border-radius: 22px;
      padding: 22px 18px; color: var(--text); text-align: center; backdrop-filter: blur(14px);
    }
    #startCard h1, #messageBox h2 { margin: 0 0 12px; font-size: 24px; }
    #startCard p, #messageBox p { margin: 0 0 14px; color: var(--muted); line-height: 1.45; font-size: 15px; }
    #startBtn { width: 100%; min-height: 58px; background: rgba(255,255,255,.1); }
    #messageOverlay[hidden], #startOverlay[hidden] { display: none; }
    .hidden { display: none !important; }
  </style>
</head>
<body>
  <canvas id="camerafeed"></canvas>

  <div id="ui" class="hidden">
    <div id="topBar">
      <div id="brand">XR Scene</div>
      <div id="statusPill">Инициализация…</div>
    </div>
    <div id="centerGuide"></div>
    <div id="instruction">Поводи телефоном влево‑вправо и вверх‑вниз, пока не появится точка размещения.</div>
    <div id="bottomBar">
      <button id="placeBtn" disabled>Разместить</button>
      <button id="photoBtn">Фото</button>
      <button id="musicBtn">Музыка</button>
      <a id="siteBtn" class="actionBtn" href="https://example.com" target="_blank" rel="noopener noreferrer">На сайт</a>
    </div>
  </div>

  <div id="startOverlay">
    <div id="startCard">
      <h1>XR сцена</h1>
      <p>Нажми «Запустить», дай доступ к камере, затем поводить телефоном, чтобы найти поверхность. После этого нажми «Разместить».</p>
      <button id="startBtn">Запустить</button>
    </div>
  </div>

  <div id="messageOverlay" hidden>
    <div id="messageBox">
      <h2 id="messageTitle">Ошибка</h2>
      <p id="messageText">Что-то пошло не так.</p>
      <button id="messageCloseBtn">Закрыть</button>
    </div>
  </div>

  <audio id="bgMusic" src="assets/music.wav" preload="auto" loop></audio>

  <script src="./external/runtime/runtime.js"></script>
  <script src="./external/xr/xr.js" async></script>
  <script src="./app.js"></script>
</body>
</html>
