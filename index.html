<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
  <title>XR Scene Starter</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div id="app"></div>

  <div id="scan-ui" class="panel visible">
    <div class="panel-title">Найдите поверхность</div>
    <div id="status-text" class="panel-text">Поводите телефоном влево-вправо и вверх-вниз, чтобы сцена нашла плоскость.</div>
  </div>

  <div id="top-bar" class="top-bar">
    <button id="website-btn" class="glass-btn">На сайт</button>
  </div>

  <div id="bottom-bar" class="bottom-bar">
    <button id="reset-btn" class="glass-btn">Переставить</button>
    <button id="photo-btn" class="capture-btn">Фото</button>
  </div>

  <a id="download-link" style="display:none"></a>

  <script type="module" src="./app.js"></script>
</body>
</html>
